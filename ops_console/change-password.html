<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FlySunbird • Change password</title>
  <link rel="stylesheet" href="./admin_assets/admin.css"/>
  <style>
    .change-wrap { max-width: 400px; margin: 80px auto; padding: 24px; }
    .change-wrap h1 { margin: 0 0 8px; font-weight: 900; }
    .change-wrap .sub { color: var(--muted); margin-bottom: 24px; }
    .change-wrap label { display: block; margin-top: 14px; font-weight: 600; }
    .change-wrap input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--panel); color: var(--text); margin-top: 6px; }
    .change-wrap .btn { width: 100%; margin-top: 20px; padding: 14px; }
    .change-wrap .err { color: #f87171; margin-top: 12px; font-size: 14px; }
  </style>
</head>
<body class="admin">
  <div class="change-wrap">
    <h1>Change password</h1>
    <p class="sub">You must set a new password before continuing.</p>
    <form id="changeForm">
      <label>Current password</label>
      <input type="password" id="oldPassword" placeholder="Temporary or current password" required autocomplete="current-password"/>
      <label>New password</label>
      <input type="password" id="newPassword" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password"/>
      <label>Confirm new password</label>
      <input type="password" id="confirmPassword" placeholder="Same as above" required minlength="8" autocomplete="new-password"/>
      <button type="submit" class="btn primary" id="submitBtn">Change password</button>
    </form>
    <div class="err" id="err" style="display:none"></div>
  </div>
  <script>
    if (!localStorage.getItem("FSB_TOKEN") || !localStorage.getItem("FSB_API_BASE")) {
      window.location.replace("login.html");
    }
    document.getElementById("changeForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const apiBase = (localStorage.getItem("FSB_API_BASE") || "").trim().replace(/\/+$/, "");
      const oldPw = document.getElementById("oldPassword").value;
      const newPw = document.getElementById("newPassword").value;
      const confirmPw = document.getElementById("confirmPassword").value;
      const errEl = document.getElementById("err");
      const btn = document.getElementById("submitBtn");
      errEl.style.display = "none";
      if (newPw !== confirmPw) {
        errEl.textContent = "New password and confirmation do not match.";
        errEl.style.display = "block";
        return;
      }
      if (newPw.length < 8) {
        errEl.textContent = "New password must be at least 8 characters.";
        errEl.style.display = "block";
        return;
      }
      btn.disabled = true;
      try {
        const res = await fetch(apiBase + "/auth/change-password", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + (localStorage.getItem("FSB_TOKEN") || "") },
          body: JSON.stringify({ oldPassword: oldPw, newPassword: newPw })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          errEl.textContent = (data.detail || data.message || res.statusText) || "Failed to change password.";
          errEl.style.display = "block";
          btn.disabled = false;
          return;
        }
        var target = "admin-dashboard.html";
        try {
          var meRes = await fetch(apiBase + "/auth/me", { headers: { "Authorization": "Bearer " + localStorage.getItem("FSB_TOKEN") } });
          if (meRes.ok) {
            var me = await meRes.json();
            if ((me.role || "").toLowerCase() === "pilot") target = "pilot-dashboard.html";
          }
        } catch (_) {}
        window.location.href = target;
      } catch (err) {
        errEl.textContent = err.message || "Network error.";
        errEl.style.display = "block";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
