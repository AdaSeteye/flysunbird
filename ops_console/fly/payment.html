<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FlySunbird • Payment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css" />
</head>

<body>
<main class="container">
    <section class="hero">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div>
          <h2 style="margin:0 0 6px;font-weight:900">Payment</h2>
          <div class="hint">Pay with Selcom (mobile money or card in Tanzania).</div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <button class="btn" id="backPassengers" type="button">Back to passengers</button>
          <button class="btn" id="backBooking" type="button">Back to booking</button>
        </div>
      </div>

      <div style="margin-top:14px;display:flex;justify-content:center;flex-wrap:wrap;gap:16px">
        <div class="card" style="padding:20px;max-width:420px;width:100%">
          <div id="summary" style="margin-bottom:16px"></div>
          <div class="pay-form" data-method="selcom">
            <div class="field-grid">
              <div class="field" style="grid-column:1/-1">
                <label>Customer phone (mobile money number)</label>
                <input class="input" id="selcomPhone" type="tel" inputmode="tel" placeholder="+255712345678" data-required="1">
                <div class="hint sub" style="margin-top:4px">Valid Tanzania mobile number (e.g. 0712 345 678 or +255712345678).</div>
              </div>
              <div class="field">
                <label>Channel</label>
                <select class="input select" data-required="1">
                  <option value="" disabled selected>Select channel</option>
                  <option>Card</option>
                  <option>Mobile Money</option>
                  <option>Bank</option>
                </select>
              </div>
              <div class="field">
                <label>Invoice email (optional)</label>
                <input class="input" type="email" placeholder="name@email.com" />
              </div>
            </div>
          </div>
          <div class="pay-actions" style="margin-top:16px">
            <button class="btn primary" id="payNow" type="button">Pay now</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/storage.js"></script>
  <script src="assets/ui-datewheel.js"></script>
  <script src="assets/ui-datepicker.js"></script>
  <script src="assets/payment.js"></script>
</body>
</html>
