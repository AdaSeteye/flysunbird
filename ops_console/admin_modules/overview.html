<!doctype html>
<html><head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="../admin_assets/module.css"/>
  <style>
    .chart-bars{max-height:280px;overflow-y:auto}
    .chart-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:12px}
    .chart-label{width:96px;flex-shrink:0;color:var(--muted)}
    .chart-bar-wrap{flex:1;min-width:0;height:20px;background:rgba(255,255,255,0.08);border-radius:6px;overflow:hidden}
    .chart-bar{height:100%;border-radius:6px;min-width:2px;transition:width .2s}
    .chart-bar.bookings{background:linear-gradient(90deg,rgba(56,189,248,0.6),rgba(56,189,248,0.9))}
    .chart-bar.revenue{background:linear-gradient(90deg,rgba(34,197,94,0.5),rgba(34,197,94,0.85))}
    .chart-value{width:52px;text-align:right;flex-shrink:0;font-weight:700}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hrow">
      <div>
        <h1>Overview</h1>
      </div>
      <div class="actions">
        <button class="btn" type="button" data-label="Refresh" onclick="refreshWithFeedback(this)">Refresh</button>
      </div>
    </div>

    <div class="card" id="kpis"></div>

    <div class="card" id="chartSection" style="display:none">
      <div style="font-weight:900;margin-bottom:8px">Bookings by day (last 14 days)</div>
      <div class="chart-bars" id="chartBookings"></div>
      <div style="font-weight:900;margin:16px 0 8px">Revenue by day (USD)</div>
      <div class="chart-bars" id="chartRevenue"></div>
    </div>

    <div class="card" id="overviewHintCard" style="display:none">
      <div class="sub">No slots today. <button type="button" class="btn small primary" id="overviewGoFillSlots">Fill slots</button></div>
    </div>

    <div class="card">
      <div class="sub">Create bookings, payment links, confirm or cancel. Sign in to see data.</div>
    </div>
  </div>

  <script src="../admin_assets/ops_api.js"></script>
  <script src="../admin_assets/ops_inventory.js"></script>
  <script src="../admin_assets/ops_bookings.js"></script>
  <script>
    if (window.parent === window && !localStorage.getItem("FSB_TOKEN") && !localStorage.getItem("FSB_API_BASE")) {
      window.location.replace(/admin_modules\//.test(window.location.pathname || "") ? "../login.html" : "login.html");
    }
    const API_BASE = (window.API_BASE || localStorage.getItem("FSB_API_BASE") || "").replace(/\/$/, "");
    const hasAuth = !!(API_BASE && localStorage.getItem("FSB_TOKEN"));
    const esc = window.FSB_esc || (s => (s == null || s === undefined ? "" : String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")));

    async function refreshWithFeedback(btn){
      if(btn){ btn.disabled=true; btn.textContent='Loading…'; }
      try { await render(); } finally { if(btn){ btn.disabled=false; btn.textContent=btn.dataset.label||'Refresh'; } }
    }

    async function refreshToken(){ return window.FSB_refreshToken ? await window.FSB_refreshToken() : false; }

    function computeTodayStatsFromRules(rules) {
      var now = new Date();
      var weekday = (now.getUTCDay() + 6) % 7;
      var inventorySlots = 0, seatsAvailable = 0;
      (rules || []).forEach(function(r) {
        if (!r.active) return;
        var days = (r.days_of_week || "").split(",").map(function(x){ return parseInt(x.trim(), 10); }).filter(function(n){ return !isNaN(n); });
        if (days.indexOf(weekday) === -1) return;
        var times = (r.times || "").split(",").filter(function(t){ return t.trim(); });
        var n = times.length;
        var cap = parseInt(r.capacity, 10) || 0;
        inventorySlots += n;
        seatsAvailable += n * cap;
      });
      return { inventorySlots: inventorySlots, seatsAvailable: seatsAvailable };
    }

    function renderCharts(metrics) {
      var byDay = (metrics && metrics.bookings_by_day) ? metrics.bookings_by_day : [];
      var revByDay = (metrics && metrics.revenue_by_day) ? metrics.revenue_by_day : [];
      var maxB = Math.max(1, Math.max.apply(null, byDay.map(function(p){ return p.value || 0; })));
      var maxR = Math.max(1, Math.max.apply(null, revByDay.map(function(p){ return p.value || 0; })));
      var chartSection = document.getElementById('chartSection');
      var chartBookings = document.getElementById('chartBookings');
      var chartRevenue = document.getElementById('chartRevenue');
      if (!chartSection || !chartBookings || !chartRevenue) return;
      chartSection.style.display = (byDay.length || revByDay.length) ? 'block' : 'none';
      chartBookings.innerHTML = byDay.slice(-14).map(function(p){
        var v = p.value || 0;
        var pct = maxB ? Math.round((v / maxB) * 100) : 0;
        return '<div class="chart-row"><span class="chart-label">' + esc((p.date || '').slice(5)) + '</span><div class="chart-bar-wrap"><div class="chart-bar bookings" style="width:' + pct + '%"></div></div><span class="chart-value">' + v + '</span></div>';
      }).join('') || '<div class="sub">No data</div>';
      chartRevenue.innerHTML = revByDay.slice(-14).map(function(p){
        var v = p.value || 0;
        var pct = maxR ? Math.round((v / maxR) * 100) : 0;
        return '<div class="chart-row"><span class="chart-label">' + esc((p.date || '').slice(5)) + '</span><div class="chart-bar-wrap"><div class="chart-bar revenue" style="width:' + pct + '%"></div></div><span class="chart-value">' + v + '</span></div>';
      }).join('') || '<div class="sub">No data</div>';
    }

    async function render(){
      if (hasAuth) {
        try {
          var token = localStorage.getItem("FSB_TOKEN") || "";
          var bookingsRes = await fetch(API_BASE + "/ops/bookings", { headers: { "Authorization": "Bearer " + token } });
          var statsRes = await fetch(API_BASE + "/ops/dashboard/today-stats", { headers: { "Authorization": "Bearer " + token } });
          var metricsRes = await fetch(API_BASE + "/ops/dashboard/metrics?days=14", { headers: { "Authorization": "Bearer " + token } });
          if (bookingsRes.status === 401 && await refreshToken()) {
            token = localStorage.getItem("FSB_TOKEN");
            bookingsRes = await fetch(API_BASE + "/ops/bookings", { headers: { "Authorization": "Bearer " + token } });
            statsRes = await fetch(API_BASE + "/ops/dashboard/today-stats", { headers: { "Authorization": "Bearer " + token } });
            metricsRes = await fetch(API_BASE + "/ops/dashboard/metrics?days=14", { headers: { "Authorization": "Bearer " + token } });
          }
          var list = bookingsRes.ok ? await bookingsRes.json() : [];
          var stats = statsRes.ok ? await statsRes.json() : null;
          if (!stats && statsRes.status === 404) {
            var rulesRes = await fetch(API_BASE + "/ops/slot-rules", { headers: { "Authorization": "Bearer " + token } });
            var rules = rulesRes.ok ? await rulesRes.json() : [];
            stats = computeTodayStatsFromRules(rules);
          }
          if (!stats) stats = { inventorySlots: 0, seatsAvailable: 0 };
          var pending = list.filter(function(b){ return (b.paymentStatus || "").toLowerCase() !== "paid"; }).length;
          var slotsToday = stats.inventorySlots != null ? stats.inventorySlots : 0;
          document.getElementById('kpis').innerHTML =
            '<div class="grid">' +
            '<div class="card" style="margin:0"><div class="sub">Inventory slots (today)</div><div style="font-weight:900;font-size:18px;margin-top:6px">' + esc(slotsToday) + '</div></div>' +
            '<div class="card" style="margin:0"><div class="sub">Seats available (today)</div><div style="font-weight:900;font-size:18px;margin-top:6px">' + esc(stats.seatsAvailable != null ? stats.seatsAvailable : 0) + '</div></div>' +
            '<div class="card" style="margin:0"><div class="sub">Bookings</div><div style="font-weight:900;font-size:18px;margin-top:6px">' + esc(list.length) + '</div></div>' +
            '<div class="card" style="margin:0"><div class="sub">Pending payment</div><div style="font-weight:900;font-size:18px;margin-top:6px">' + esc(pending) + '</div></div>' +
            '</div>';
          var metrics = metricsRes.ok ? await metricsRes.json() : null;
          renderCharts(metrics);
          var hintCard = document.getElementById('overviewHintCard');
          if (hintCard) {
            hintCard.style.display = slotsToday === 0 ? 'block' : 'none';
          }
          return;
        } catch (e) {
          document.getElementById('kpis').innerHTML = '<div class="sub">Error loading: ' + esc(e.message || String(e)) + '</div>';
          return;
        }
      }
      document.getElementById('kpis').innerHTML = '<div class="sub">Sign in to view overview.</div>';
      document.getElementById('chartSection').style.display = 'none';
      var h = document.getElementById('overviewHintCard');
      if (h) h.style.display = 'none';
    }
    render();
    var goFillSlots = document.getElementById('overviewGoFillSlots');
    if (goFillSlots) goFillSlots.addEventListener('click', function(){
      try {
        var parentNav = window.parent && window.parent.document ? window.parent.document.querySelector('a.nav-link[onclick*="fill-slots"]') : null;
        if (parentNav) parentNav.click();
      } catch (e) {}
    });
  </script>
</body></html>
