<!doctype html>
<html><head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="../admin_assets/module.css"/>
</head>
<body>
<div class="wrap">
  <div class="hrow">
    <div>
      <h1>Fill slots</h1>
    </div>
  </div>

  <div id="pickSection" class="card">
    <div class="hrow">
      <div style="font-weight:900">Route &amp; date</div>
    </div>
    <div class="hr"></div>
    <div class="row" style="align-items:flex-end;flex-wrap:wrap;gap:12px">
      <div>
        <label>From</label>
        <select id="fromSelect">
          <option value="">— Select origin —</option>
        </select>
      </div>
      <div>
        <label>To</label>
        <select id="toSelect">
          <option value="">— Select destination —</option>
        </select>
      </div>
      <div>
        <label>Date</label>
        <input id="fillDate" type="date"/>
      </div>
      <div>
        <button class="btn" type="button" data-label="Load existing" onclick="loadExisting(this)">Load existing</button>
      </div>
    </div>
  </div>

  <div id="slotsSection" class="card">
    <div class="hrow">
      <div style="font-weight:900">Slots to create</div>
      <div class="actions">
        <button class="btn small" type="button" onclick="addSlotRow()">+ Add slot</button>
        <button class="btn primary" type="button" data-label="Save" onclick="saveFill(this)">Save</button>
      </div>
    </div>
    <div class="hr"></div>
    <div style="overflow:auto">
      <table class="table">
        <thead>
          <tr>
            <th>Start</th><th>End</th><th>Price (USD)</th><th>Seats</th><th>Flight no</th><th>Cabin</th><th>Aircraft type</th><th>Departure location</th><th></th>
          </tr>
        </thead>
        <tbody id="slotsTbody"></tbody>
      </table>
    </div>
    <div id="fillMsg" class="sub" style="margin-top:8px"></div>
  </div>

  <div id="existingSection" class="card" style="display:none">
    <div class="hrow">
      <div style="font-weight:900">Existing slots for this route + date</div>
    </div>
    <div class="hr"></div>
    <div style="overflow:auto">
      <table class="table">
        <thead>
          <tr>
            <th>Time</th><th>Seats</th><th>Price (USD)</th><th>Flight</th><th>Cabin</th>
          </tr>
        </thead>
        <tbody id="existingTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="../admin_assets/ops_api.js"></script>
<script src="../admin_assets/ops_inventory.js"></script>
<script>
  if (window.parent === window && !localStorage.getItem("FSB_TOKEN") && !localStorage.getItem("FSB_API_BASE")) {
    window.location.replace(/admin_modules\//.test(window.location.pathname || "") ? "../login.html" : "login.html");
  }
  const API_BASE = (window.API_BASE || localStorage.getItem("FSB_API_BASE") || "").replace(/\/$/, "");
  let allOriginOptions = [];

  async function loadFromToDropdowns() {
    const fromSel = document.getElementById("fromSelect");
    const toSel = document.getElementById("toSelect");
    if (!fromSel || !toSel) return;
    try {
      const res = await fetch(API_BASE + "/public/origins");
      const data = res.ok ? await res.json() : null;
      const list = (data && data.origins) ? data.origins : [];
      allOriginOptions = (list || []).map(o => {
        const region = (o.region || "").toUpperCase();
        const value = (o.value != null && o.value !== "" ? o.value : o.label || "").trim();
        const display = region === "OTHER" ? (o.sub || value || o.label || "").trim() : (o.label || value || "").trim();
        return { value, display };
      }).filter(o => o.value);
      const esc = window.FSB_esc || (s => (s == null || s === undefined ? "" : String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")));
      const optHtml = allOriginOptions.map(o => "<option value=\"" + esc(o.value).replace(/"/g,"&quot;") + "\">" + esc(o.display) + "</option>").join("");
      fromSel.innerHTML = "<option value=\"\">— Select origin —</option>" + optHtml;
      toSel.innerHTML = "<option value=\"\">— Select destination —</option>" + optHtml;
    } catch (e) {
      fromSel.innerHTML = "<option value=\"\">— Could not load (check API) —</option>";
      toSel.innerHTML = "<option value=\"\">— Select destination —</option>";
    }
  }

  function updateToDropdown() {
  }

  async function getRouteId(fromLabel, toLabel) {
    if (!fromLabel || !toLabel) return null;
    try {
      const r = await window.OpsApi.fetch("GET", "/ops/route-by-labels?from_label=" + encodeURIComponent(fromLabel) + "&to_label=" + encodeURIComponent(toLabel));
      return r && r.id ? r.id : null;
    } catch (e) {
      if (e.message && e.message.indexOf("404") !== -1) {
        try {
          const created = await window.OpsApi.fetch("POST", "/ops/routes?fromLabel=" + encodeURIComponent(fromLabel) + "&toLabel=" + encodeURIComponent(toLabel));
          return created && created.id ? created.id : null;
        } catch (e2) {
          return null;
        }
      }
      return null;
    }
  }

  async function loadExisting(btn) {
    const fromLabel = (document.getElementById("fromSelect") && document.getElementById("fromSelect").value || "").trim();
    const toLabel = (document.getElementById("toSelect") && document.getElementById("toSelect").value || "").trim();
    const dateStr = document.getElementById("fillDate").value;
    if (!fromLabel || !toLabel || !dateStr) {
      alert("Select From, To, and Date first.");
      return;
    }
    const routeId = await getRouteId(fromLabel, toLabel);
    if (!routeId) {
      alert("Could not find or create route for this From/To.");
      return;
    }
    if (!routeId || !dateStr) {
      alert("Select a route and date first.");
      return;
    }
    if (btn) { btn.disabled = true; btn.textContent = "Loading…"; }
    try {
      const rows = await OpsInventory.listRemote(dateStr, routeId);
      const tbody = document.getElementById("existingTbody");
      const section = document.getElementById("existingSection");
      if (!rows.length) {
        tbody.innerHTML = "<tr><td colspan=\"5\" class=\"sub\">No existing slots for this route and date.</td></tr>";
      } else {
        const esc = window.FSB_esc || (s => (s == null || s === undefined ? "" : String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")));
        tbody.innerHTML = rows.map(t =>
          "<tr><td>" + esc(t.start || "") + " – " + esc(t.end || "") + "</td><td>" + esc(t.seats_available ?? 0) + "</td><td>$" + esc(t.price_usd ?? t.override_price_usd ?? 0) + "</td><td>" + esc(t.flight_no || "") + "</td><td>" + esc(t.cabin || "") + "</td></tr>"
        ).join("");
      }
      section.style.display = "block";
    } catch (e) {
      alert(e.message || "Failed to load");
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = btn.dataset.label || "Load existing"; }
    }
  }

  let slotRows = [];

  function addSlotRow(start, end, priceUsd, seats, flightNo, cabin, aircraftType, departureLocation) {
    slotRows.push({
      start: start || "09:00",
      end: end || "10:00",
      price_usd: priceUsd != null ? priceUsd : 298,
      seats_available: seats != null ? seats : 3,
      flight_no: flightNo || "FSB",
      cabin: cabin || "Economy",
      aircraft_type: aircraftType || "",
      departure_location: departureLocation || ""
    });
    renderSlotRows();
  }

  function removeSlotRow(i) {
    slotRows.splice(i, 1);
    renderSlotRows();
  }

  function renderSlotRows() {
    const tbody = document.getElementById("slotsTbody");
    const esc = function(s) { return (s == null ? "" : String(s)).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); };
    tbody.innerHTML = slotRows.map((row, i) => {
      const idEsc = String(i).replace(/"/g, "&quot;");
      return "<tr data-i=\"" + idEsc + "\">" +
        "<td><input type=\"text\" class=\"slot-start\" value=\"" + esc(row.start) + "\" placeholder=\"09:00\"/></td>" +
        "<td><input type=\"text\" class=\"slot-end\" value=\"" + esc(row.end) + "\" placeholder=\"10:00\"/></td>" +
        "<td><input type=\"number\" class=\"slot-price\" min=\"1\" value=\"" + (row.price_usd ?? 298) + "\"/></td>" +
        "<td><input type=\"number\" class=\"slot-seats\" min=\"1\" max=\"99\" value=\"" + (row.seats_available ?? 3) + "\"/></td>" +
        "<td><input type=\"text\" class=\"slot-flight\" value=\"" + esc(row.flight_no || "FSB") + "\"/></td>" +
        "<td><input type=\"text\" class=\"slot-cabin\" value=\"" + esc(row.cabin || "Economy") + "\"/></td>" +
        "<td><input type=\"text\" class=\"slot-aircraft\" value=\"" + esc(row.aircraft_type || "") + "\" placeholder=\"e.g. R44 Raven ii\"/></td>" +
        "<td><input type=\"text\" class=\"slot-departure\" value=\"" + esc(row.departure_location || "") + "\" placeholder=\"e.g. Nungwi Airstrip\"/></td>" +
        "<td><button type=\"button\" class=\"btn small\" onclick=\"removeSlotRow(" + i + ")\">Remove</button></td></tr>";
    }).join("");
  }

  function collectSlotsFromTable() {
    const tbody = document.getElementById("slotsTbody");
    const out = [];
    tbody.querySelectorAll("tr").forEach((tr) => {
      const start = (tr.querySelector(".slot-start") || {}).value || "09:00";
      const end = (tr.querySelector(".slot-end") || {}).value || "10:00";
      const price = parseInt((tr.querySelector(".slot-price") || {}).value, 10) || 298;
      const seats = parseInt((tr.querySelector(".slot-seats") || {}).value, 10) || 3;
      const flight = (tr.querySelector(".slot-flight") || {}).value || "FSB";
      const cabin = (tr.querySelector(".slot-cabin") || {}).value || "Economy";
      const aircraftType = (tr.querySelector(".slot-aircraft") || {}).value || "";
      const departureLocation = (tr.querySelector(".slot-departure") || {}).value || "";
      out.push({
        start, end, price_usd: price, seats_available: seats, flight_no: flight, cabin,
        aircraft_type: aircraftType.trim() || null,
        departure_location: departureLocation.trim() || null
      });
    });
    return out;
  }

  async function saveFill(btn) {
    const fromLabel = (document.getElementById("fromSelect") && document.getElementById("fromSelect").value || "").trim();
    const toLabel = (document.getElementById("toSelect") && document.getElementById("toSelect").value || "").trim();
    const dateStr = document.getElementById("fillDate").value;
    if (!fromLabel || !toLabel || !dateStr) {
      alert("Select From, To, and Date first.");
      return;
    }
    const routeId = await getRouteId(fromLabel, toLabel);
    if (!routeId) {
      alert("Could not find or create route for this From/To.");
      return;
    }
    const slots = collectSlotsFromTable();
    if (!slots.length) {
      alert("Add at least one slot row.");
      return;
    }
    if (btn) { btn.disabled = true; btn.textContent = "Saving…"; }
    const msgEl = document.getElementById("fillMsg");
    try {
      const res = await window.OpsApi.fetch("POST", "/ops/slots/fill", { route_id: routeId, date_str: dateStr, slots });
      let msg = "Created " + (res.created || 0) + " slot(s).";
      if (res.skipped && res.skipped > 0) msg += " " + res.skipped + " slot(s) already existed (not created).";
      msgEl.textContent = msg;
      msgEl.style.color = "";
      if (res.created > 0) loadExisting();
    } catch (e) {
      var errMsg = "Save failed.";
      if (e && e.message) {
        try {
          var d = JSON.parse(e.message);
          if (d && typeof d.detail === "string") errMsg = d.detail;
          else if (d && Array.isArray(d.detail) && d.detail[0] && d.detail[0].msg) errMsg = d.detail[0].msg;
          else errMsg = e.message;
        } catch (_) { errMsg = e.message; }
      }
      msgEl.textContent = errMsg;
      msgEl.style.color = "var(--danger, #c00)";
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = btn.dataset.label || "Save"; }
    }
  }

  document.getElementById("fillDate").value = new Date().toISOString().slice(0, 10);
  addSlotRow();
  var fromSel = document.getElementById("fromSelect");
  if (fromSel) fromSel.addEventListener("change", updateToDropdown);
  loadFromToDropdowns().catch(function() {});
</script>
</body></html>
